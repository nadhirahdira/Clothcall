name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle wrapper executable
        working-directory: ClothCall
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: ClothCall
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clothcall-debug-apk
          path: ClothCall/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish direct APK download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Latest Debug APK
          body: Latest debug APK for phone testing.
          files: ClothCall/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          make_latest: true
